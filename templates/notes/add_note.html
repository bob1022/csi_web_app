<!DOCTYPE html>
<html>
<head>
    <title>Add Project Note</title>
</head>
<body>

<h1>Add Project Note</h1>

<form method="post">

    <label for="note_text">Note:</label><br>

    <textarea
    name="note_text"
    id="note_text"
    rows="10"
    cols="80"
    placeholder="Enter project note here..."
    required
></textarea>

    <br><br>

    <button type="submit">
        Save Note
    </button>

</form>

</body>
</html>
