
# * Edit Project
<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
</head>
<body>

    <h1>Edit Project</h1>

    <form method="POST">

        <label>
            Project Name:
        </label>

        <input
            type="text"
            name="project_name"
            value="{{ project.project_name }}"
            required
        >

        <br><br>

        <label>
            Project Description:
        </label>

        <br>

        <textarea
            name="notes"
            rows="6"
            cols="60"
        >{{ project.notes }}</textarea>

        <br><br>

        <button type="submit">
            Save Changes
        </button>

    </form>

</body>
</html>
