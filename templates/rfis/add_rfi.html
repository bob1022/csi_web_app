<!DOCTYPE html>
<html>
<head>
    <title>Add RFI</title>
</head>
<body>

<h1>Add RFI</h1>

<form method="post">

    <label for="rfi_number">
        RFI Number:
    </label>
    <input
        type="text"
        name="rfi_number"
        id="rfi_number"
        required
    >
    <br><br>

    <label for="description">
        Description:
    </label>
    <input
        type="text"
        name="description"
        id="description"
        size="60"
        required
    >
    <br><br>

    <label for="discipline">
        Discipline:
    </label>

    <select
        name="discipline"
        id="discipline"
    >
        <option>Architect</option>
        <option>Structural Engineer</option>
        <option>Mechanical Engineer</option>
        <option>Electrical Engineer</option>
        <option>Civil Engineer</option>
        <option>Geotechnical Engineer</option>
        <option>Fire Protection Engineer</option>
        <option>Owner</option>
        <option>Other</option>
    </select>

    <br><br>

    <label for="date_submitted">
        Date Submitted:
    </label>
    <input
        type="date"
        name="date_submitted"
        id="date_submitted"
        required
    >

    <br><br>

    <label for="date_due">
        Date Due:
    </label>
    <input
        type="date"
        name="date_due"
        id="date_due"
        required
    >

    <br><br>

    <label for="status">
        Status:
    </label>

    <select
        name="status"
        id="status"
    >
        <option>Open</option>
        <option>Answered</option>
        <option>Closed</option>
    </select>

    <br><br>

    <button type="submit">
        Save RFI
    </button>

</form>

</body>
</html>
