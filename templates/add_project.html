<!DOCTYPE html>
<html>
<head>
    <title>Add Project</title>
</head>
<body>

    <h1>Add Project</h1>

    <form method="POST">

        <label for="project_name">
            Project Name:
        </label>

        <input
            type="text"
            id="project_name"
            name="project_name"
            required
        >

        <br><br>

        <button type="submit">
            Add Project
        </button>

    </form>
<p>
    <a href="/projects">
        Back to Projects
    </a>
</p>

</body>
</html>
