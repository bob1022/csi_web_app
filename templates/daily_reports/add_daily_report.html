<!DOCTYPE html>
<html>
<head>
    <title>Add Daily Report</title>
</head>
<body>

<h1>Add Daily Report</h1>

<form method="post">

    <p>
        Report Date:<br>
        <input
            type="date"
            name="report_date"
            required>
    </p>

    <p>
        Weather:<br>
        <input
            type="text"
            name="weather">
    </p>

    <p>
        Site Activities:<br>
        <textarea
            name="work_performed"
            rows="8"
            cols="60">
        </textarea>
    </p>

    <button type="submit">
        Save Daily Report
    </button>

</form>

</body>
</html>
