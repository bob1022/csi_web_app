<!DOCTYPE html>
<html>
<head>
    <title>Add Checklist Item</title>
</head>
<body>

    <h1>Add Item</h1>

    <h2>{{ project.project_name }}</h2>

    <form method="POST">

        <label>
            Division:
        </label>

        <input
            type="text"
            name="division"
            required
        >

        <br><br>

        <label>
            Description:
        </label>

        <input
            type="text"
            name="description"
            required
        >

        <br><br>

        <button type="submit">
            Add Item
        </button>

    </form>

</body>
</html>
